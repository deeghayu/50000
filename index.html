<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ශාක්‍යසිංහ මංගල්‍යය - 2570</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&family=Noto+Sans+Sinhala:wght@300;500;700&family=Poppins:wght@400;600;700&display=swap');

        :root { --gold: #ffd700; --deep-gold: #b8860b; --bg-dark: #070502; }

        /* INTRO SCREEN */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 99999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .fire-dancers { display: flex; gap: 50px; margin-bottom: 20px; }
        .fire-dancers img { width: 150px; height: 150px; object-fit: contain; }
        #enter-btn { 
            background: none; border: 2px solid var(--gold); padding: 15px 30px;
            color: var(--gold); cursor: pointer; border-radius: 50px;
            font-family: 'Abhaya Libre'; font-size: 1.5rem; transition: 0.3s;
        }
        #enter-btn:hover { background: var(--gold); color: #000; }

        body, html { margin: 0; padding: 0; background-color: var(--bg-dark); color: #ffffff; font-family: 'Noto Sans Sinhala', sans-serif; overflow-x: hidden; }
        #mainHomepage { display: block; padding: 40px 20px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="fire-dancers">
            <img src="fire-left.gif" alt="Fire" onerror="this.style.display='none'">
            <img src="fire-right.gif" alt="Fire" onerror="this.style.display='none'">
        </div>
        <button id="enter-btn">
            පිවිසෙන්න
        </button>
    </div>

    <div id="mainHomepage">
        <h1>ශාක්‍යසිංහ මංගල්‍යය - 2570</h1>
        <p>ආයුබෝවන්! මෙය ගොකරැල්ල මධ්‍ය මහා විද්‍යාලයේ වෙසක් වැඩසටහනයි.</p>
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const introScreen = document.getElementById('intro-screen');
            const enterBtn = document.getElementById('enter-btn');

            // කලින් ඇවිත් නම් කෙලින්ම සයිට් එක පෙන්වන්න
            if (sessionStorage.getItem('visited')) {
                introScreen.classList.add('hidden');
            }

            // බටන් එක එබුවම
            enterBtn.addEventListener('click', () => {
                introScreen.style.opacity = '0';
                introScreen.style.transition = 'opacity 0.5s';
                setTimeout(() => {
                    introScreen.classList.add('hidden');
                    sessionStorage.setItem('visited', 'true');
                }, 500);
            });
        });
    </script>
</body>
</html>
